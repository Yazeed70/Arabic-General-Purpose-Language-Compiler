<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مترجم لغة ضاد</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Fira+Code&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1><span class="gradient-text">لغة ضاد</span> التفاعلية</h1>
            <p>اكتب كودك البرمجي ونفذه مباشرة عبر المتصفح بتصميم عصري</p>
        </header>

        <div class="editor-layout">
            <div class="panel code-panel">
                <div class="panel-header">
                    <span>محرر الأكواد</span>
                    <button id="run-btn" class="run-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        تشغيل الكود
                    </button>
                </div>
                <textarea id="code-editor" spellcheck="false" placeholder="اكتب كود ضاد هنا..."></textarea>
            </div>

            <div class="panel output-panel">
                <div class="panel-header">
                    <span>النتيجة (المخرجات)</span>
                    <button id="clear-btn" class="clear-btn">مسح</button>
                </div>
                <pre id="output-screen"></pre>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
